name: Build and Push Multi-Arch Docker Image to GHCR

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build and push multi-arch image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/garage:${{ env.TAG_NAME }}
            ghcr.io/${{ github.repository_owner }}/garage:latest
          # --- START: ADD THESE LINES FOR CACHING ---
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # --- END: ADD THESE LINES FOR CACHING ---
